[build]
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22.23.1"
  NPM_VERSION = "10.9.2"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  framework = "#auto"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
